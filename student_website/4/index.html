<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리듬 게임 - 구름 위 천국의 계단 (v7)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <div id="game-screen" class="screen active">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="hud">
            <div id="level-display">레벨: <span id="level-val">1</span> (천국)</div>
            <div>점수: <span id="score-val">0</span></div>
        </div>
        <div id="feedback">좋아요!</div>

        <div id="start-screen" class="inner-screen active">
            <h1>✨ 구름 위 천국 vs 지옥 🔥</h1>
            <div class="instructions">
                몽글몽글한 <b>천국의 구름</b>과 대리석 계단,<br>
                이글거리는 <b>지옥의 불길</b>과 용암!<br>
                천국과 지옥을 넘나드는 리듬 속으로!
            </div>
            <button onclick="startGame()">시작하기</button>
        </div>

        <div id="result-screen" class="inner-screen">
            <h1>게임 결과</h1>
            <div class="result-box">
                <p>내 점수: <span id="final-score">0</span>점</p>
                <p class="high-score">최고 기록: <span id="best-score">0</span>점</p>
            </div>
            <div id="result-message" style="font-size: 24px; margin-bottom: 20px; color: #ff5722;"></div>
            <button onclick="startGame()">다시 시작하기</button>
            <button class="exit" onclick="goHome()">메인 화면으로</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
