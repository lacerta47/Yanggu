<svg viewBox="0 0 500 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <!-- 몸판 -->
  <path d="M140,280 Q250,250 360,280 L380,450 Q250,480 120,450 Z" fill="#ffffff" stroke="#333" stroke-width="2.5" filter="url(#shadow)"/>
  <!-- 줄무늬 -->
  <path d="M135,310 Q250,290 365,310 M130,345 Q250,325 370,345 M125,380 Q250,360 375,380 M120,415 Q250,395 380,415" stroke="#4fc3f7" stroke-width="12" fill="none" opacity="0.8"/>
  <!-- 소매 -->
  <path d="M140,280 Q70,320 85,380" fill="none" stroke="#ffffff" stroke-width="48" stroke-linecap="round" filter="url(#shadow)"/>
  <path d="M360,280 Q430,320 415,380" fill="none" stroke="#ffffff" stroke-width="48" stroke-linecap="round" filter="url(#shadow)"/>
</svg>