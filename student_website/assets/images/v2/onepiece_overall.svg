<svg viewBox="0 0 500 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <!-- 몸판 -->
  <path d="M135,280 Q250,240 365,280 L385,455 Q250,490 115,455 Z" fill="#3f51b5" stroke="#1a237e" stroke-width="3" filter="url(#shadow)"/>
  <!-- 멜빵 끈 -->
  <path d="M170,280 L180,240 Q250,220 320,240 L330,280" fill="none" stroke="#3f51b5" stroke-width="15" stroke-linecap="round"/>
  <!-- 주머니 -->
  <rect x="220" y="320" width="60" height="50" rx="10" fill="#5c6bc0" stroke="#1a237e" stroke-width="2"/>
  <!-- 다리 부분 (캐릭터 다리에 맞춤) -->
  <path d="M115,455 L140,560 L240,560 L250,455 L260,455 L270,560 L370,560 L385,455 Z" fill="#3f51b5" stroke="#1a237e" stroke-width="3" filter="url(#shadow)"/>
</svg>