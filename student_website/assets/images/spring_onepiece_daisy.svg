<svg viewBox="0 0 400 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="clothShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <!-- 원피스 몸판 -->
  <path d="M125,240 Q125,440 200,440 Q275,440 275,240 Z" fill="#fff9c4" stroke="#fbc02d" stroke-width="3" filter="url(#clothShadow)"/>
  <path d="M125,340 Q200,320 275,340 L340,490 Q200,530 60,490 Z" fill="#fff9c4" stroke="#fbc02d" stroke-width="3" filter="url(#clothShadow)"/>
  
  <!-- 소매 -->
  <g transform="translate(130, 260) rotate(25)">
    <rect x="-22" y="-5" width="44" height="60" rx="10" fill="#fff9c4" stroke="#fbc02d" stroke-width="2"/>
  </g>
  <g transform="translate(270, 260) rotate(-25)">
    <rect x="-22" y="-5" width="44" height="60" rx="10" fill="#fff9c4" stroke="#fbc02d" stroke-width="2"/>
  </g>

  <!-- 꽃무늬 -->
  <circle cx="200" cy="300" r="8" fill="#fbc02d"/>
  <circle cx="200" cy="285" r="5" fill="white"/>
  <circle cx="215" cy="300" r="5" fill="white"/>
  <circle cx="200" cy="315" r="5" fill="white"/>
  <circle cx="185" cy="300" r="5" fill="white"/>
</svg>