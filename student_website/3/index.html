<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>폭신폭신 곰인형 옷 입히기 v1</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-app">
        <!-- 시작 화면 -->
        <section id="start-screen" class="screen">
            <div class="intro-box">
                <img src="../assets/images/bear_base.svg" alt="곰돌이" class="intro-bear">
                <h1 class="game-title">폭신폭신 곰인형<br>코디 놀이</h1>
                <button id="start-btn" class="cute-btn">놀기 시작!</button>
            </div>
        </section>

        <!-- 옷 입히기 화면 -->
        <section id="play-screen" class="screen hidden">
            <div class="game-container">
                <!-- 왼쪽: 곰돌이 전시 구역 -->
                <div class="character-zone">
                    <div class="scene-bg"></div>
                    <div class="bear-frame">
                        <img src="../assets/images/bear_base.svg" class="base-image" alt="곰돌이 몸통">
                        <div id="equipped-layer">
                            <img id="layer-bottom" class="cloth-layer" src="" alt="">
                            <img id="layer-onepiece" class="cloth-layer" src="" alt="">
                            <img id="layer-top" class="cloth-layer" src="" alt="">
                            <img id="layer-accessory" class="cloth-layer" src="" alt="">
                        </div>
                    </div>
                </div>

                <!-- 오른쪽: 옷장 구역 -->
                <div class="wardrobe-zone">
                    <div class="category-tabs">
                        <button class="cat-tab active" data-category="top">상의</button>
                        <button class="cat-tab" data-category="bottom">하의</button>
                        <button class="cat-tab" data-category="onepiece">한벌옷</button>
                        <button class="cat-tab" data-category="accessory">소품</button>
                    </div>
                    <div id="item-shelf" class="item-shelf">
                        <!-- 아이템들이 여기에 나타나요 -->
                    </div>
                    <div class="bottom-nav">
                        <button id="finish-btn" class="cute-btn small">다 입혔어요!</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 결과 화면 -->
        <section id="result-screen" class="screen hidden">
            <div class="result-box">
                <div class="bubble">와! 너무 폭신하고 예뻐요! ❤️</div>
                <div id="final-bear-container" class="bear-frame final"></div>
                <div class="btn-group">
                    <button id="retry-btn" class="cute-btn secondary">다시 하기</button>
                    <button id="reset-btn" class="cute-btn">처음으로</button>
                </div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
