<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRPG - 에픽 판타지 사가 (Ver 4.0)</title>
    <style>
        :root {
            --gold: #d4af37;
            --silver: #c0c0c0;
            --bg-dark: #0a0a0f;
            --panel-bg: #16161d;
            --success: #00ff88;
            --fail: #ff4444;
            --perfect: #00ffff;
            --accent: #a349a4;
            --combat: #ff8800;
            --narrator: #88ccff;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: #f0f0f5;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.5s;
        }

        .hidden { display: none !important; }

        #start-screen { background: radial-gradient(circle, #1a2a6c, #b21f1f, #fdbb2d); }
        h1 { font-size: 5rem; color: white; text-shadow: 0 0 30px black; margin-bottom: 20px; }
        
        #world-screen { background: #111; }
        .world-options { display: flex; gap: 20px; margin-top: 40px; flex-wrap: wrap; justify-content: center; }
        .world-card {
            width: 280px; padding: 20px;
            background: var(--panel-bg);
            border: 2px solid var(--silver);
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .world-card:hover { transform: scale(1.05); border-color: var(--gold); box-shadow: 0 0 20px var(--gold); }
        .world-card h3 { color: var(--gold); margin-bottom: 10px; }

        #main-ui {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 1rem;
            box-sizing: border-box;
            background: linear-gradient(to bottom, #0a0a0f, #1a1a2e);
        }

        header { display: flex; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; }
        .panel {
            background: var(--panel-bg);
            border: 1px solid #333;
            padding: 1rem;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        #char-info { flex: 2; border-top: 3px solid var(--gold); }
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 5px; }
        .stat-box { text-align: center; font-size: 0.8rem; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--gold); }

        #dice-panel { flex: 0.8; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #dice-visual {
            width: 60px; height: 60px; border: 3px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: var(--gold); background: black;
            border-radius: 10px;
        }

        #inventory-panel { flex: 1.2; }
        #inventory-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .item-slot { width: 100%; aspect-ratio: 1/1; background: #000; border: 1px solid #333; position: relative; }
        .item-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        #game-body { flex: 1; display: flex; flex-direction: column; gap: 1rem; overflow: hidden; }
        #event-log {
            flex: 1; background: rgba(0,0,0,0.7); border: 1px solid #222;
            padding: 1.5rem; border-radius: 10px; overflow-y: auto;
            font-size: 1.1rem; line-height: 1.6;
            display: flex; flex-direction: column-reverse;
        }
        .log-entry { margin-bottom: 0.8rem; border-left: 3px solid transparent; padding-left: 10px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .narrator { color: var(--narrator); font-style: italic; border-left-color: var(--narrator); }
        .user-msg { color: #fff; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 5px; align-self: flex-end; }
        .system { color: #aaa; font-size: 0.9rem; }
        .combat-log { color: var(--combat); border-left-color: var(--combat); }
        .item-get { color: var(--gold); font-weight: bold; }
        .tier-perfect { color: var(--perfect); font-weight: bold; }
        .tier-good { color: var(--success); font-weight: bold; }
        .tier-normal { color: var(--silver); }
        .tier-bad { color: var(--fail); font-weight: bold; }

        #choice-panel {
            display: flex; flex-direction: column; gap: 10px; padding: 10px;
            background: rgba(0,0,0,0.5); border-radius: 10px;
        }
        .choice-btn {
            padding: 15px; background: #222; border: 1px solid #444; color: white;
            border-radius: 8px; cursor: pointer; text-align: left; transition: 0.2s;
            font-size: 1rem; display: flex; justify-content: space-between;
        }
        .choice-btn:hover { background: #333; border-color: var(--gold); }
        .choice-btn .stat-tag { font-size: 0.8rem; color: var(--gold); opacity: 0.8; }

        #chat-area { display: flex; gap: 10px; padding: 10px; }
        #chat-input {
            flex: 1; background: #000; border: 1px solid #444; color: white;
            padding: 12px; border-radius: 8px; outline: none;
        }

        #action-bar { display: flex; gap: 10px; justify-content: center; padding: 10px; }
        .btn {
            padding: 12px 30px; font-size: 1rem; border-radius: 30px; border: none;
            cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .btn-main { background: var(--gold); color: black; min-width: 200px; }
        .btn-main:disabled { background: #444; color: #888; cursor: not-allowed; }

        #skill-panel { margin-top: 5px; }
        .skill-list { display: flex; gap: 5px; justify-content: center; }
        .skill-btn {
            background: var(--accent); color: white; border: none; padding: 5px 10px;
            border-radius: 5px; cursor: pointer; font-size: 0.75rem;
        }
        .skill-btn:disabled { background: #333; }

        #guide { position: fixed; bottom: 5px; right: 10px; font-size: 11px; color: #555; }

        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            header { flex-direction: column; height: auto; }
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .btn-main { width: 100%; }
        }
    </style>
</head>
<body>

<div id="start-screen" class="screen">
    <h1>TRPG</h1>
    <p style="font-size:1.5rem; color:white;">에픽 판타지 사가 v4.0</p>
    <button id="start-btn" class="btn btn-main" style="margin-top:2rem;">모험 시작하기</button>
</div>

<div id="world-screen" class="screen hidden">
    <h2 style="font-size:2.5rem; color:var(--gold);">세계를 선택하십시오</h2>
    <div class="world-options">
        <div class="world-card" onclick="selectWorld('fantasy')">
            <h3>판타지: 용사 탄생</h3>
            <p>마왕을 처단하고 대륙에 평화를 가져오십시오.</p>
        </div>
        <div class="world-card" onclick="selectWorld('hell')">
            <h3>지옥: 부활의 길</h3>
            <p>칠대죄 마신들의 힘을 빼앗아 이승으로 탈출하십시오.</p>
        </div>
        <div class="world-card" onclick="selectWorld('heaven')">
            <h3>천국: 실낙원</h3>
            <p>타락한 천사들을 처단하고 정의를 바로잡으십시오.</p>
        </div>
    </div>
</div>

<div id="main-ui" class="hidden">
    <header>
        <div id="char-info" class="panel">
            <h2 id="race-display" style="margin:0; font-size: 1.1rem;">종족 결정 중...</h2>
            <div id="skill-panel">
                <div class="skill-list" id="skill-list"></div>
            </div>
            <div class="stats-grid">
                <div class="stat-box">힘<br><span id="stat-str" class="stat-val">-</span></div>
                <div class="stat-box">체력<br><span id="stat-hp" class="stat-val">-</span></div>
                <div class="stat-box">방어<br><span id="stat-def" class="stat-val">-</span></div>
                <div class="stat-box">민첩<br><span id="stat-agi" class="stat-val">-</span></div>
                <div class="stat-box">지력<br><span id="stat-int" class="stat-val">-</span></div>
            </div>
        </div>

        <div id="dice-panel" class="panel">
            <div id="dice-visual">?</div>
            <div style="font-size:0.7rem; color:var(--gold); margin-top:5px;">D20</div>
        </div>

        <div id="inventory-panel" class="panel">
            <h4 style="margin:0 0 5px 0; font-size: 0.8rem; color: var(--gold);">인벤토리</h4>
            <div id="inventory-list">
                <div class="item-slot" id="slot-0"><div class="item-icon"></div></div>
                <div class="item-slot" id="slot-1"><div class="item-icon"></div></div>
                <div class="item-slot" id="slot-2"><div class="item-icon"></div></div>
                <div class="item-slot" id="slot-3"><div class="item-icon"></div></div>
            </div>
        </div>
    </header>

    <div id="game-body">
        <div id="event-log"></div>
        
        <div id="choice-panel" class="hidden">
            <!-- 선택지 버튼이 여기에 생성됨 -->
        </div>

        <div id="chat-area">
            <input type="text" id="chat-input" placeholder="서술자에게 질문하십시오..." autocomplete="off">
        </div>

        <div id="action-bar">
            <button id="action-btn" class="btn btn-main" disabled>진행하기 (SPACE)</button>
        </div>
    </div>
</div>

<div id="guide">ENTER: 리셋 | SPACE: 주사위/진행 | 클릭: 선택/스킬</div>

<script>
    // --- 데이터 정의 ---
    const races = ["엘프", "반신", "벌레인간", "천사", "뱀파이어", "악마", "수인", "드래곤본", "드워프", "언데드"];
    const skills = {
        "엘프": [{ name: "정령의 화살", stat: "agi", bonus: 6, damage: 15, type: "공격" }],
        "반신": [{ name: "신의 권능", stat: "all", bonus: 4, damage: 10, type: "버프" }],
        "벌레인간": [{ name: "껍질 강화", stat: "def", bonus: 8, damage: 5, type: "방어" }],
        "천사": [{ name: "광휘", stat: "hp", bonus: 7, damage: 12, type: "정화" }],
        "뱀파이어": [{ name: "영생의 피", stat: "all", bonus: 5, damage: 8, type: "회복" }],
        "악마": [{ name: "지옥불", stat: "str", bonus: 8, damage: 20, type: "파괴" }],
        "수인": [{ name: "야수 본능", stat: "agi", bonus: 10, damage: 5, type: "기습" }],
        "드래곤본": [{ name: "화염 브레스", stat: "str", bonus: 6, damage: 25, type: "폭발" }],
        "드워프": [{ name: "바위의 심장", stat: "hp", bonus: 12, damage: 5, type: "탱킹" }],
        "언데드": [{ name: "어둠의 지배", stat: "all", bonus: 6, damage: 7, type: "저주" }]
    };

    const worlds = {
        fantasy: {
            name: "판타지: 용사 탄생",
            stages: [
                {
                    text: "성검의 숲 입구에 도착했습니다. 성검을 찾기 위한 첫 걸음을 내딛어야 합니다.",
                    choices: [
                        { text: "숲의 기운을 직접 느껴 탐색한다.", stat: "int", item: "성검 엑스칼리버" },
                        { text: "거친 덤불을 힘으로 헤치며 나아간다.", stat: "str", item: "강철 장화" }
                    ]
                },
                {
                    text: "마왕군의 정찰대가 당신을 발견했습니다! 빠르게 대처해야 합니다.",
                    choices: [
                        { text: "민첩하게 정찰대의 뒤를 잡아 기습한다.", stat: "agi", item: "비밀 지도" },
                        { text: "정면에서 적의 공격을 방어하며 압박한다.", stat: "def", item: "나이트의 방패" }
                    ]
                },
                {
                    text: "마왕 성의 미로에 진입했습니다. 함정이 가득한 곳입니다.",
                    choices: [
                        { text: "함정의 메커니즘을 분석하여 해제한다.", stat: "int", item: "마력핵" },
                        { text: "함정을 몸으로 버티며 돌파한다.", stat: "hp", item: "강인한 목걸이" }
                    ]
                },
                {
                    text: "마침내 마왕의 옥좌 앞입니다. 최후의 결전이 기다립니다.",
                    choices: [
                        { text: "모든 힘을 집중하여 강력한 일격을 날린다.", stat: "str" },
                        { text: "적의 빈틈을 노려 치명적인 곳을 찌른다.", stat: "agi" }
                    ]
                }
            ],
            endings: {
                A: { title: "전설의 용사", text: "당신은 마왕을 완벽히 압도했습니다. 대륙에 영원한 평화가 찾아왔습니다." },
                B: { title: "타락한 구원자 (BAD)", text: "마왕을 처단했으나 그의 저주가 당신을 잠식했습니다. 당신은 새로운 마왕이 되었습니다." }
            }
        },
        hell: {
            name: "지옥: 부활의 길",
            stages: [
                {
                    text: "'오만의 마신'이 당신의 길을 막고 비웃습니다.",
                    choices: [
                        { text: "마신의 논리적 허점을 파고들어 무력화한다.", stat: "int", item: "오만의 눈" },
                        { text: "강력한 위압감으로 마신을 찍어누른다.", stat: "str", item: "마신의 송곳니" }
                    ]
                },
                {
                    text: "끓어오르는 용암 지대가 나타났습니다.",
                    choices: [
                        { text: "지형을 이용하여 안전한 길을 찾아간다.", stat: "agi", item: "용암 보석" },
                        { text: "뜨거운 열기를 인내하며 정면 돌파한다.", stat: "hp", item: "나태의 수의" }
                    ]
                },
                {
                    text: "'질투의 마신'이 그림자 속에서 당신을 유혹합니다.",
                    choices: [
                        { text: "강한 정신력으로 유혹을 방어한다.", stat: "def", item: "진실의 거울" },
                        { text: "그림자 자체를 지혜로 꿰뚫어본다.", stat: "int", item: "질투의 날개" }
                    ]
                },
                {
                    text: "이승으로 통하는 '심판의 문' 앞에 도달했습니다.",
                    choices: [
                        { text: "지금까지 모은 힘으로 문을 부순다.", stat: "str" },
                        { text: "문의 수호자와 최후의 지혜 대결을 펼친다.", stat: "int" }
                    ]
                }
            ],
            endings: {
                A: { title: "이승의 귀환자", text: "당신은 죽음의 굴레를 끊고 살아있는 자들의 땅으로 돌아갔습니다." },
                B: { title: "영원한 수인 (BAD)", text: "탈출에 실패했습니다. 당신은 마신들에게 영원히 고문당하는 운명에 처했습니다." }
            }
        },
        heaven: {
            name: "천국: 실낙원",
            stages: [
                {
                    text: "타락한 감찰관이 당신의 앞길을 가로막습니다.",
                    choices: [
                        { text: "감찰관의 비리를 폭로하여 권위를 추락시킨다.", stat: "int", item: "감찰관의 안경" },
                        { text: "민첩한 움직임으로 감찰관의 공격을 피하며 접근한다.", stat: "agi", item: "정의의 날개" }
                    ]
                },
                {
                    text: "'탐욕의 천사'가 신성한 보물을 독점하고 있습니다.",
                    choices: [
                        { text: "보물에 담긴 사악한 마력을 정화한다.", stat: "hp", item: "신성한 금화" },
                        { text: "방패로 보물의 유혹을 차단하고 응징한다.", stat: "def", item: "심판의 검" }
                    ]
                },
                {
                    text: "가장 높은 곳, 대천사 메타트론이 위엄 있게 강림합니다.",
                    choices: [
                        { text: "대천사의 압도적인 힘에 맞서 전력을 다한다.", stat: "str" },
                        { text: "대천사의 권능을 지혜로 카운터한다.", stat: "int" }
                    ]
                }
            ],
            endings: {
                A: { title: "하늘의 정화자", text: "천상계의 부패를 씻어냈습니다. 당신은 새로운 정의의 화신이 되었습니다." },
                B: { title: "추락한 날개 (BAD)", text: "대천사에게 패배하여 날개가 꺾인 채 지상으로 추락했습니다." }
            }
        }
    };

    // --- 상태 변수 ---
    let stats = { str:0, hp:0, def:0, agi:0, int:0 };
    let inventory = [];
    let currentRace = "";
    let currentWorld = null;
    let currentStageIdx = 0;
    let isInitialized = false;
    let isRolling = false;
    let usedSkill = null;
    let skillCooldown = 0;
    let narratorAffinity = 0;
    let gameState = "START"; // START, CHOICE, GLIMPSE, FINAL_ROLL, RESULT
    let currentChoice = null;
    let glimpseRoll = 0;
    let finalTier = "";

    // --- 오디오 ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+duration);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime+duration);
    }

    // --- 핵심 로직 ---
    function addLog(msg, type="") {
        const log = document.getElementById("event-log");
        const entry = document.createElement("div");
        entry.className = "log-entry " + type;
        entry.innerHTML = msg;
        log.prepend(entry);
    }

    function updateStatDisplay() {
        Object.keys(stats).forEach(s => {
            const el = document.getElementById(`stat-${s}`);
            if(el) el.textContent = stats[s];
        });
    }

    function updateSkillButtons() {
        const btns = document.querySelectorAll(".skill-btn");
        btns.forEach(btn => {
            if (skillCooldown > 0) {
                btn.disabled = true;
                btn.textContent = `${btn.dataset.name} (${skillCooldown})`;
            } else {
                btn.disabled = false;
                btn.textContent = btn.dataset.name;
            }
        });
    }

    function selectWorld(worldKey) {
        currentWorld = worlds[worldKey];
        document.getElementById("world-screen").classList.add("hidden");
        document.getElementById("main-ui").classList.remove("hidden");
        document.getElementById("action-btn").disabled = false;
        addLog(`<span class='narrator'>[서술자] <b>${currentWorld.name}</b>의 세계에 오신 것을 환영합니다.</span>`, "narrator");
        addLog(`스페이스바를 눌러 영웅의 본질을 결정하십시오.`);
    }

    function addItem(itemName) {
        const itemObj = { name: itemName, stat: "all", bonus: 2 };
        inventory.push(itemObj);
        const slot = document.getElementById(`slot-${inventory.length-1}`);
        if(slot) slot.querySelector(".item-icon").innerHTML = "🎁";
        addLog(`<span class='item-get'>[획득] ${itemName}</span>`);
        playSound(440, 0.5);
    }

    function rollDice(callback) {
        if (isRolling) return;
        isRolling = true;
        document.getElementById("action-btn").disabled = true;
        const diceVisual = document.getElementById("dice-visual");
        let count = 0;
        const interval = setInterval(() => {
            diceVisual.textContent = Math.floor(Math.random()*20)+1;
            count++;
            if (count > 10) {
                clearInterval(interval);
                isRolling = false;
                callback(parseInt(diceVisual.textContent));
            }
        }, 50);
    }

    function initCharacter() {
        rollDice((roll) => {
            const raceIdx = Math.floor(Math.random()*10);
            currentRace = races[raceIdx];
            Object.keys(stats).forEach(s => stats[s] = Math.floor(Math.random()*10)+8);

            document.getElementById("race-display").textContent = "종족: " + currentRace;
            updateStatDisplay();
            
            const skillContainer = document.getElementById("skill-list");
            skillContainer.innerHTML = "";
            skills[currentRace].forEach((sk) => {
                const btn = document.createElement("button");
                btn.className = "skill-btn";
                btn.textContent = sk.name;
                btn.dataset.name = sk.name;
                btn.onclick = () => {
                    if (skillCooldown > 0 || usedSkill) return;
                    usedSkill = sk;
                    skillCooldown = 3;
                    updateSkillButtons();
                    addLog(`✨ <b>${currentRace}</b>의 기술 <b>[${sk.name}]</b> 발동! (${sk.type})`, "combat-log");
                    playSound(660, 0.4);
                };
                skillContainer.appendChild(btn);
            });

            addLog(`<span class='narrator'>[서술자] <b>${currentRace}</b> 영웅이여, 당신의 선택이 세상을 바꿀 것입니다.</span>`, "narrator");
            isInitialized = true;
            gameState = "CHOICE";
            showStage();
        });
    }

    function showStage() {
        const stage = currentWorld.stages[currentStageIdx];
        addLog(`<span class='narrator'>[서술자] ${stage.text} 어떻게 행동하시겠습니까?</span>`, "narrator");
        
        const choicePanel = document.getElementById("choice-panel");
        choicePanel.innerHTML = "";
        stage.choices.forEach((c, idx) => {
            const btn = document.createElement("button");
            btn.className = "choice-btn";
            btn.innerHTML = `<span>${idx+1}. ${c.text}</span> <span class='stat-tag'>[${c.stat.toUpperCase()}]</span>`;
            btn.onclick = () => makeChoice(c);
            choicePanel.appendChild(btn);
        });
        choicePanel.classList.remove("hidden");
        document.getElementById("action-btn").disabled = true;
    }

    function makeChoice(choice) {
        currentChoice = choice;
        document.getElementById("choice-panel").classList.add("hidden");
        addLog(`👤 <b>선택:</b> ${choice.text}`);
        
        const actionBtn = document.getElementById("action-btn");
        actionBtn.textContent = "운명 엿보기 (SPACE)";
        actionBtn.disabled = false;
        gameState = "GLIMPSE";
    }

    function handleGlimpse() {
        rollDice((roll) => {
            glimpseRoll = roll;
            let comment = "";
            if (roll >= 15) comment = "운명이 당신을 향해 미소 짓는군요.";
            else if (roll >= 7) comment = "평범한 흐름입니다. 당신의 의지가 중요하겠네요.";
            else comment = "불길한 징조가 보입니다. 최선을 다해야 할 것입니다.";
            
            addLog(`<span class='narrator'>[서술자] 운명 엿보기: <b>${roll}</b>. ${comment} 이제 결과를 확인하시겠습니까?</span>`, "narrator");
            
            const actionBtn = document.getElementById("action-btn");
            actionBtn.textContent = "최종 판정 (SPACE)";
            actionBtn.disabled = false;
            gameState = "FINAL_ROLL";
        });
    }

    function handleFinalRoll() {
        rollDice((roll) => {
            let bonus = 0;
            if (usedSkill) {
                if (usedSkill.stat === currentChoice.stat || usedSkill.stat === "all") bonus = usedSkill.bonus;
                usedSkill = null;
            }

            const total = roll + stats[currentChoice.stat] + bonus;
            let tier = "";
            let tierText = "";
            let tierClass = "";

            if (total >= 25) { tier = "PERFECT"; tierText = "퍼펙트!"; tierClass = "tier-perfect"; }
            else if (total >= 19) { tier = "GOOD"; tierText = "굿"; tierClass = "tier-good"; }
            else if (total >= 13) { tier = "NORMAL"; tierText = "노말"; tierClass = "tier-normal"; }
            else { tier = "BAD"; tierText = "배드"; tierClass = "tier-bad"; }

            finalTier = tier;
            addLog(`<span class='system'>[최종 판정] 주사위(${roll}) + 능력치(${stats[currentChoice.stat]}) + 보너스(${bonus}) = <b>${total}</b></span>`);
            addLog(`<span class='${tierClass}'>[결과] ${tierText}</span>`);

            let resultMsg = "";
            if (tier === "PERFECT") {
                resultMsg = "기적 같은 성공입니다! 당신의 전설이 기록될 것입니다.";
                if (currentChoice.item) addItem(currentChoice.item);
                stats[currentChoice.stat] += 2;
            } else if (tier === "GOOD") {
                resultMsg = "훌륭합니다. 계획대로 일이 풀리고 있군요.";
                if (currentChoice.item) addItem(currentChoice.item);
            } else if (tier === "NORMAL") {
                resultMsg = "적당히 해결되었습니다. 하지만 아쉬움이 남네요.";
            } else {
                resultMsg = "참혹한 실패입니다. 어둠의 손길이 당신을 덮칩니다.";
                stats.hp = Math.max(1, stats.hp - 2);
            }
            
            updateStatDisplay();
            addLog(`<span class='narrator'>[서술자] ${resultMsg} 이 결과에 만족하시나요?</span>`, "narrator");

            if (skillCooldown > 0) {
                skillCooldown--;
                updateSkillButtons();
            }

            gameState = "RESULT";
            const actionBtn = document.getElementById("action-btn");
            actionBtn.textContent = "다음으로 (SPACE)";
            actionBtn.disabled = false;
        });
    }

    function nextStep() {
        currentStageIdx++;
        if (currentStageIdx >= currentWorld.stages.length) {
            showEnding(finalTier !== "BAD");
        } else {
            gameState = "CHOICE";
            showStage();
        }
    }

    function showEnding(isSuccess) {
        const ending = isSuccess ? currentWorld.endings.A : currentWorld.endings.B;
        setTimeout(() => {
            document.getElementById("main-ui").style.opacity = "0.3";
            const endingPanel = document.createElement("div");
            endingPanel.className = "screen";
            endingPanel.style.background = "rgba(0,0,0,0.9)";
            endingPanel.innerHTML = `
                <h1 style='color:var(--gold)'>${ending.title}</h1>
                <p style='font-size:1.5rem; padding: 0 10%; line-height:1.6; text-align:center;'>${ending.text}</p>
                <button class='btn btn-main' onclick='location.reload()' style='margin-top:2rem;'>새로운 삶 시작</button>
            `;
            document.body.appendChild(endingPanel);
        }, 1000);
    }

    // --- 채팅 처리 ---
    document.getElementById("chat-input").onkeydown = (e) => {
        if (e.code === "Enter" && e.target.value.trim() !== "") {
            const val = e.target.value;
            addLog(`👤 나: ${val}`, "user-msg");
            e.target.value = "";

            setTimeout(() => {
                let response = "흥미로운 질문이군요. 하지만 운명은 당신의 선택에 달려 있습니다. 무엇을 망설이시나요?";
                const msg = val.toLowerCase();
                if (msg.includes("도와줘") || msg.includes("힌트")) {
                    response = "주사위의 결과는 무작위지만, 당신의 능력치와 스킬이 그것을 보완해줄 것입니다. 자신의 힘을 믿으세요.";
                } else if (msg.includes("누구")) {
                    response = "나는 당신의 끝을 지켜보고 기록하는 자입니다. 당신의 이야기가 어떻게 끝날지, 그것이 나의 유일한 관심사죠.";
                }
                
                addLog(`<span class='narrator'>[서술자] ${response}</span>`, "narrator");
            }, 600);
        }
    };

    // --- 버튼/키 이벤트 ---
    document.getElementById("start-btn").onclick = () => {
        document.getElementById("start-screen").classList.add("hidden");
        document.getElementById("world-screen").classList.remove("hidden");
        audioCtx.resume();
    };

    document.getElementById("action-btn").onclick = () => {
        if (gameState === "START") initCharacter();
        else if (gameState === "GLIMPSE") handleGlimpse();
        else if (gameState === "FINAL_ROLL") handleFinalRoll();
        else if (gameState === "RESULT") nextStep();
    };

    window.onkeydown = (e) => {
        if (e.target.tagName === "INPUT") return;
        if (e.key === " " && !isRolling && !document.getElementById("action-btn").disabled) {
            e.preventDefault();
            document.getElementById("action-btn").click();
        } else if (e.key === "Enter" && document.getElementById("main-ui").classList.contains("hidden")) {
            location.reload();
        }
    };
</script>
</body>
</html>
