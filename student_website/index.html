<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양구 바이브코딩 - 작품 전시장</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --primary-gradient: linear-gradient(135deg, #e0f2f1 0%, #fce4ec 100%);
            --card-bg: rgba(255, 255, 255, 0.45);
            --card-hover-bg: rgba(255, 255, 255, 0.65);
            --text-color: #2c3e50;
            --accent-color: #ec407a;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: var(--primary-gradient);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 배경 애니메이션 (Blobs) - 모바일 성능을 위해 크기 및 경로 최적화 */
        .background-blob {
            position: fixed;
            width: 40vw; /* 화면 너비에 비례하게 조절 */
            height: 40vw;
            min-width: 300px;
            min-height: 300px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
        .blob1 { 
            top: -10%; 
            left: -10%; 
            animation: move1 25s infinite alternate ease-in-out; 
        }
        .blob2 { 
            bottom: -10%; 
            right: -10%; 
            animation: move2 30s infinite alternate ease-in-out; 
        }

        @keyframes move1 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(20vw, 15vh); }
        }
        @keyframes move2 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-20vw, -15vh); }
        }

        /* 페이지 로드 애니메이션 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header, .container, footer {
            animation: fadeIn 1s ease-out forwards;
            z-index: 1;
        }

        header {
            text-align: center;
            margin: 10vh 0 5vh;
            padding: 0 20px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem); /* 반응형 폰트 크기 */
            margin-bottom: 0.5rem;
            color: #1a2a3a;
            font-weight: 900;
            letter-spacing: -0.03em;
            text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.3);
            line-height: 1.1;
        }

        header p {
            font-size: clamp(1rem, 3vw, 1.25rem);
            color: #556b82;
            font-weight: 500;
        }

        .container {
            max-width: 1000px;
            width: 90%;
            display: grid;
            /* 반응형 그리드: 최소 250px, 가능한 한 많이 채움 */
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2rem;
            margin-bottom: 10vh;
        }

        /* 글래스모피즘 카드 */
        .button-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 28px;
            aspect-ratio: 16 / 10; /* 일정한 비율 유지 */
            min-height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        /* 호버 애니메이션 (터치 디바이스 고려) */
        @media (hover: hover) {
            .button-card:hover {
                transform: translateY(-10px) scale(1.03);
                background: var(--card-hover-bg);
                box-shadow: 0 20px 40px rgba(236, 64, 122, 0.15);
                border: 1px solid rgba(255, 255, 255, 0.6);
            }
            .button-card:hover .card-num {
                color: var(--accent-color);
                text-shadow: 0 0 15px rgba(236, 64, 122, 0.3);
            }
        }

        /* 터치 시 피드백 */
        .button-card:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.7);
        }

        .card-num {
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            font-weight: 800;
            color: var(--text-color);
            margin-bottom: 4px;
            transition: color 0.3s ease;
        }

        .card-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        footer {
            margin-top: auto;
            padding: 4rem 2rem;
            color: #7f8c8d;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
        }

        /* 모바일 최적화 미세 조정 */
        @media (max-width: 600px) {
            .container {
                grid-template-columns: 1fr; /* 모바일은 1열로 */
                gap: 1.25rem;
            }
            header {
                margin-top: 7vh;
            }
            .button-card {
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="background-blob blob1"></div>
    <div class="background-blob blob2"></div>

    <header>
        <h1>바이브코딩</h1>
        <p>상상력을 코드로 구현하는 시간</p>
    </header>

    <main class="container">
        <div class="button-card" onclick="goTo(1)">
            <span class="card-num">01</span>
            <span class="card-label">Project</span>
        </div>
        <div class="button-card" onclick="goTo(2)">
            <span class="card-num">02</span>
            <span class="card-label">Project</span>
        </div>
        <div class="button-card" onclick="goTo(3)">
            <span class="card-num">03</span>
            <span class="card-label">Project</span>
        </div>
        <div class="button-card" onclick="goTo(4)">
            <span class="card-num">04</span>
            <span class="card-label">Project</span>
        </div>
        <div class="button-card" onclick="goTo(5)">
            <span class="card-num">05</span>
            <span class="card-label">Project</span>
        </div>
        <div class="button-card" onclick="goTo(6)">
            <span class="card-num">06</span>
            <span class="card-label">Project</span>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Yanggu Vibe Coding. All rights reserved.</p>
    </footer>

    <script>
        function goTo(num) {
            window.location.href = './' + num + '/index.html';
        }
    </script>

</body>
</html>
